<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var k = localStorage.getItem('safex-theme') || localStorage.getItem('vc-theme');
          var light = k === 'light';
          document.documentElement.classList.add(light ? 'light' : 'dark');
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeXchange</title>
    <link rel="icon" type="image/png" href="/images/safexchange-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
