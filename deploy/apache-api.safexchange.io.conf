# Apache virtual host for api.safexchange.io
# Enable modules first:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
# Copy to /etc/apache2/sites-available/ then:
#   sudo a2ensite apache-api.safexchange.io.conf
#   sudo systemctl reload apache2

<VirtualHost *:443>
    ServerName api.safexchange.io

  SSLEngine on
  # Point to your cert paths (certbot / cPanel / etc.)
  # SSLCertificateFile /etc/letsencrypt/live/api.safexchange.io/fullchain.pem
  # SSLCertificateKeyFile /etc/letsencrypt/live/api.safexchange.io/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off

    # Node backend — must match PORT in backend/.env (default 5001)
    ProxyPass / http://127.0.0.1:5001/
    ProxyPassReverse / http://127.0.0.1:5001/

    # Socket.io WebSocket upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:5001/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://127.0.0.1:5001/$1 [P,L]

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ErrorLog ${APACHE_LOG_DIR}/api.safexchange.io-error.log
    CustomLog ${APACHE_LOG_DIR}/api.safexchange.io-access.log combined
</VirtualHost>
